<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트 - 강아지? 고양이?</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>동물상 테스트</h1>
        <p class="subtitle">나는 강아지상일까, 고양이상일까?</p>
        
        <div class="upload-section">
            <input type="file" id="image-upload" accept="image/*" hidden>
            <label for="image-upload" class="upload-btn">사진 선택하기</label>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>AI가 분석 중입니다...</p>
        </div>

        <div id="result-container" class="hidden">
            <img id="image-preview" src="#" alt="미리보기">
            <div id="label-container"></div>
            <button onclick="location.reload()" class="retry-btn">다시 하기</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
